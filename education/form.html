<!DOCTYPE html>
<html>

<head>
    <title>Education Form</title>
</head>

<body>
    <h1>Education Form</h1>
    <hr>
    <form>
        <div>
            <label for="NameId">Name:</label>
            <span style="color: red;">*</span>
            <span>:</span>
            <input type="text" name="nameForName" id="NameId" required>
        </div><br>
        <div>
            <label for="EmailId">Email:</label>
            <span style="color: red;">*</span>
            <span>:</span>
            <input type="email" name="emailForName" id="EmailId" required>
        </div><br>
        <div>
            <label for="PasswordId">Password:</label>
            <span style="color: red;">*</span>
            <span>:</span>
            <input type="password" name="passwordForName" id="PasswordId" required>
        </div><br>
        <div>
            <label for="ConfirmPasswordId">Confirm Password:</label>
            <span style="color: red;">*</span>
            <span>:</span>
            <input type="password" name="confirmPasswordForName" id="ConfirmPasswordId" required>
        </div><br>
        <div>
            <label for="Mobile Number">Mobile Number:</label>
            <span style="color: red;">*</span>
            <span>:</span>
            <input type="tel" name="mobileNumberForName" id="Mobile Number" required>
        </div><br>
        <div>
            <label for="GenderId">Gender:</label>
            <span style="color: red;">*</span>
            <span>:</span>
            <input type="radio" name="genderForGender" id="GenderId" value="male">
            <label for="MaleId">Male</label>
            <input type="radio" name="genderForGender" id="FemaleId" value="female">
            <label for="FemaleId">Female</label>
        </div><br>
        <div>
            <label for="CityId">City:</label>
            <span style="color: red;">*</span>
            <span>:</span>
            <input type="checkbox" id="city1" name="cityForName" value="city1" required>
            <label for="city1">Banglore</label>
            <input type="checkbox" id="city2" name="cityForName" value="city2" required>
            <label for="city2">Mumbai</label>
        </div><br>
        <div>
            <label for="PercentageId">Percentage:</label>
            <span style="color: red;">*</span>
            <span>:</span>
            <input type="range" name="percentageForName" id="PercentageId" min="0" max="100" required>
        </div><br>
        <div>
            <label for="DateOfBirthId">Date of Birth:</label>
            <span style="color: red;">*</span>
            <span>:</span>
            <input type="date" name="dateOfBirthForName" id="DateOfBirthId" required>
        </div><br>
        <div>
            <input type="submit">
        </div>

    </form>
</body>

</html>
